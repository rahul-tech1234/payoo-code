<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Payoo | Home</title>
        <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />

        <!-- tailwind + daisy UI -->
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"
        />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <!-- fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
            rel="stylesheet"
        />
        <!-- icons -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />

        <style>
            * {
                font-family: "Outfit", sans-serif;
            }
        </style>
    </head>
    <body class="min-h-screen max-w-md bg-base-200 mx-auto">
        <!-- header section -->
        <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200 z-10">
            <section
                class="w-11/12 mx-auto py-3 flex justify-between items-center"
            >
                <div class="left flex gap-1">
                    <div class="logo w-[60px]">
                        <img src="../assets/logo.png" alt="" />
                    </div>
                    <div class="balance-info">
                        <h2 class="text-2xl font-bold">
                            $<span id="balance">45000</span>
                        </h2>
                        <p class="text-neutral/50">Avalable Balance</p>
                    </div>
                </div>
                <div class="right">
                    <a href="../index.html" class="btn btn-soft">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i
                        >Logout
                    </a>
                </div>
            </section>
        </header>
        <!-- main section -->
        <main class="w-11/12 mx-auto py-10">
            <section class="space-y-5">
                <h2 class="text-3xl font-bold">
                    Welcome to Pay<span class="text-primary">oo</span>
                </h2>
                <p class="text-neutral/50">
                    Enjoy easy and convenient financial services with us.
                    Cashout charge is low and
                </p>

                <div class="grid grid-cols-3 gap-3">
                    <!-- 1st btn -->
                    <button
                        class="btn flex-col h-full py-4 btn-primary btn-soft"
                    >
                        <img src="../assets/opt-1.png" alt="" />
                        <p>Add Money</p>
                    </button>
                    <!-- 2st btn -->
                    <button
                        class="btn flex-col h-full py-4 btn-primary btn-soft"
                    >
                        <img src="../assets/opt-2.png" alt="" />
                        <p>Cashout</p>
                    </button>
                    <!-- 3st btn -->
                    <button
                        class="btn flex-col h-full py-4 btn-primary btn-soft"
                    >
                        <img src="../assets/opt-3.png" alt="" />
                        <p>Transfer Money</p>
                    </button>
                    <!-- 4th btn -->
                    <button
                        class="btn flex-col h-full py- btn-primary btn-soft"
                    >
                        <img src="../assets/opt-4.png" alt="" />
                        <p>Get Bonus</p>
                    </button>
                    <!-- 5th btn -->
                    <button
                        class="btn flex-col h-full py-4 btn-primary btn-soft"
                    >
                        <img src="../assets/opt-5.png" alt="" />
                        <p>Pay Bill</p>
                    </button>
                    <!-- 6th btn -->
                    <button
                        class="btn flex-col h-full py-4 btn-primary btn-soft"
                    >
                        <img src="../assets/opt-6.png" alt="" />
                        <p>Transactions</p>
                    </button>
                </div>
            </section>
        </main>
        <section id="cashout" class="w-11/12 mx-auto py-5">
            <h2 class="text-xl font-bold mb-5">Cashout</h2>
            <div class="card bg-base-100 w-full shadow rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label font-bold text-neutral"
                            >Agent Number</label
                        >
                        <input
                            id="cashout-number"
                            maxlength="11"
                            minlength="11"
                            type="text"
                            class="input inline-block rounded-full bg-base-200 py-4 pl-5 mb-3 w-full"
                            placeholder="Enter 11 digit number"
                            
                        />

                        <label class="label font-bold text-neutral"
                            >Amount</label
                        >
                        <input
                            id="amount"
                            type="number"
                            class="input inline-block rounded-full bg-base-200 py-4 pl-5 mb-3 w-full"
                            placeholder="Enter amount to withdraw"
                        />

                        <label class="label font-bold text-neutral"
                            >Pin Number</label
                        >
                        <input
                            id="cahout-pin"
                            maxlength="4"
                            type="password"
                            class="w-full input inline-block rounded-full bg-base-200 py-4 pl-5 mb-3"
                            placeholder="Enter 4 Digit Pin"
                        />

                        <button
                            id="cahout-btn"
                            class="btn btn-primary mt-4 rounded-full text-[20px] font-semibold"
                        >
                            Withdraw Money
                        </button>
                    </fieldset>
                </div>
            </div>
        </section>
        <script src="../script/matchine.js"></script>
        <script src="../script/cashout.js"></script>
    </body>
</html>
